.empty{text-align:center;padding:60px;color:#aaa;grid-column:1/-1}

// Deduplicate by name
const seen=new Set();
const people=P.filter(p=>{
  const k=p.n.toLowerCase().trim();
  if(seen.has(k))return false;
  seen.add(k);
  return true;
});

// Populate function filter
const funcs=[...new Set(people.map(p=>p.f))].sort();
const fFunc=document.getElementById('fFunc');
funcs.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;fFunc.appendChild(o);});

function locGroup(l){
  const v=l.toLowerCase();
  if(v.includes('nairobi'))return'Nairobi';
  if(v.includes('mombasa'))return'Mombasa';
  if(v.includes('kisumu'))return'Kisumu';
  if(v.includes('eldoret'))return'Eldoret';
  if(v.includes('kigali')||v.includes('rwanda'))return'Rwanda';
  if(v.includes('india')||v.includes('pune')||v.includes('mumbai')||v.includes('jaipur')||v.includes('gujarat')||v.includes('haryana'))return'India';
  return'Other';
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fF=document.getElementById('fFunc').value;
  const fL=document.getElementById('fLevel').value;
  const fLoc=document.getElementById('fLoc').value;
  const fW=document.getElementById('fWork').value;

  const filtered=people.filter(p=>{
    const blob=(p.n+' '+p.f+' '+p.sk+' '+p.l+' '+p.s).toLowerCase();
    if(q&&!blob.includes(q))return false;
    if(fF&&p.f!==fF)return false;
    if(fL&&p.s!==fL)return false;
    if(fLoc&&locGroup(p.l)!==fLoc)return false;
    if(fW&&p.w!==fW)return false;
    return true;
  });

  document.getElementById('bar').textContent=`Showing ${filtered.length} of ${people.length} candidates`;
  const grid=document.getElementById('grid');

  if(filtered.length===0){
    grid.innerHTML='<div class="empty"><h3>No candidates found</h3><p>Try adjusting your search or filters.</p></div>';
    return;
  }

  grid.innerHTML=filtered.map(p=>{
    const liBtn=p.li&&p.li.startsWith('http')
      ?`<a class="btn-li" href="${p.li}" target="_blank" rel="noopener">LinkedIn &rarr;</a>`
      :`<span class="no-li">No LinkedIn</span>`;
    const skHtml=p.sk?`<div class="skills"><b>Skills &amp; Expertise</b><span class="skills-text">${p.sk}</span></div>`:'';
    const sLabel=p.s==='IC'?'Individual Contributor':p.s==='Manager'?'Manager / Team Lead':p.s==='Director'?'Director / Head':p.s==='C-suite'?'C-suite / Executive':p.s||'';
    return`<div class="card">
      <div class="card-name">${p.n}</div>
      <div class="badges">
        <span class="badge bf">${p.f}</span>
        ${sLabel?`<span class="badge bs">${sLabel}</span>`:''}
      </div>
      <div class="meta">
        <span>&#128205; ${p.l||'—'}</span>
        <span>&#128197; ${p.w==='Open'?'Open to any arrangement':p.w==='Hybrid'?'Hybrid (office + remote)':p.w==='Remote'?'Fully remote':p.w==='On-site'?'On-site / Office-based':p.w||'—'}</span>
      </div>
      ${skHtml}
      <div class="card-foot">${liBtn}</div>
    </div>`;
  }).join('');
}

function clearF(){
  document.getElementById('search').value='';
  document.getElementById('fFunc').value='';
  document.getElementById('fLevel').value='';
  document.getElementById('fLoc').value='';
  document.getElementById('fWork').value='';
  render();
}

render();
</script>
